<script>
  // 🔥 CHANGE THIS LINE ONLY
  const API = 'https://phishing-detector-8qm3.onrender.com';

  // Check if server is running when page loads
  window.addEventListener('load', async () => {
    try {
      const r = await fetch(`${API}/predict`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: "google.com" })
      });

      if (r.ok) {
        document.getElementById('status-text').textContent = 'PhishGuard AI server is online ✓';
        document.getElementById('status-dot').style.background = '#22c55e';
      }

    } catch {
      document.getElementById('status-text').textContent = 'Server offline ❌';
      document.getElementById('status-dot').style.background = '#ef4444';
    }
  });

  function tryURL(url) {
    document.getElementById('url-input').value = url;
    scanURL();
  }

  async function scanURL() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) {
      alert('Please enter a URL first!');
      return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';

    try {
      const response = await fetch(`${API}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
      });

      const data = await response.json();
      showResult(data);

    } catch (err) {
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('error-msg').textContent =
        'Cannot connect to live server!';
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  function showResult(data) {
    const label = data.result;
    const riskScore = data.risk_score;
    const confidence = data.confidence;
    const cls = label.toLowerCase();

    const colors = {
      safe: '#4ade80',
      suspicious: '#fbbf24',
      phishing: '#f87171'
    };

    const icons = { safe: '✓', suspicious: '⚠', phishing: '✕' };

    const explanations = {
      safe: `No phishing signals detected.`,
      suspicious: `Some risk signals found.`,
      phishing: `HIGH RISK! Do NOT proceed.`
    };

    document.getElementById('verdict-icon').textContent = icons[cls];
    document.getElementById('verdict-label').textContent = label;
    document.getElementById('verdict-label').style.color = colors[cls];

    document.getElementById('verdict-sub').textContent =
      `Risk score: ${riskScore}% · AI confidence: ${confidence}%`;

    const badge = document.getElementById('verdict-badge');
    badge.textContent = label.toUpperCase();
    badge.className = `badge badge-${cls}`;

    document.getElementById('risk-pct').textContent = riskScore + '%';

    const fill = document.getElementById('risk-fill');
    fill.style.width = '0%';
    fill.style.background = colors[cls];
    setTimeout(() => { fill.style.width = riskScore + '%'; }, 50);

    document.getElementById('explain-text').textContent = explanations[cls];

    const box = document.getElementById('result-box');
    box.className = `result-box result-${cls}`;
    box.style.display = 'block';
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') scanURL();
  });
</script>
